notes = [
  "BirdCLEF Evidence Research OS with a strict stage graph and ledger-backed reports.",
  "The runtime stays BirdCLEF-specific, while the orchestration layer remains lightly generic.",
]

[competition]
name = "BirdCLEF 2026"
slug = "birdclef-2026"
url = "https://www.kaggle.com/competitions/birdclef-2026"
track = "code_competition"
description = "Agent-primary BirdCLEF research workspace."
contract = "birdclef_2026"

[metrics]
primary = "soundscape_macro_roc_auc"
secondary = ["padded_cmap"]

[data]
root = "/abs/path/to/BirdCLEF-2026/dataset"
train_csv = "train.csv"
taxonomy_csv = "taxonomy.csv"
sample_submission_csv = "sample_submission.csv"
train_audio_dir = "train_audio"
train_soundscapes_dir = "train_soundscapes"
train_soundscapes_labels_csv = "train_soundscapes_labels.csv"
test_soundscapes_dir = "test_soundscapes"
perch_cache_dir = "/abs/path/to/BirdCLEF-2026/input/perch-meta"
perch_model_dir = "/abs/path/to/BirdCLEF-2026/models/google/bird-vocalization-classifier/tensorflow2/perch_v2_cpu/1"

[paths]
state_dir = "state"
artifact_dir = "artifacts"
legacy_dir = "legacy"
runtime_dir = "BirdCLEF-2026-Codebase"
knowledge_dir = "knowledge"
prompt_dir = "prompts"
report_dir = "reports"

[automation]
monitor_interval_seconds = 600
report_interval_seconds = 1800
submission_interval_hours = 6
default_timeout_minutes = 180
max_active_runs = 1
auto_execute_plans = true
auto_start_planned_runs = true
strict_stage_graph = true

[adapters]
evidence_command = ""
# Claude Code headless: `claude -p --output-format json --json-schema ...`
report_command = "python -m kaggle_agent.adapters.stage_wrapper --provider claude"
research_command = "python -m kaggle_agent.adapters.stage_wrapper --provider claude"
decision_command = "python -m kaggle_agent.adapters.stage_wrapper --provider claude"
# Claude Code agentic path for isolated plan/codegen worktrees
planner_command = "python -m kaggle_agent.adapters.stage_wrapper --provider claude_code"
codegen_command = "python -m kaggle_agent.adapters.stage_wrapper --provider claude_code"
# Optional Codex alternative:
# planner_command = "python -m kaggle_agent.adapters.stage_wrapper --provider codex"
# codegen_command = "python -m kaggle_agent.adapters.stage_wrapper --provider codex"
# Claude primary review + optional Amp JSON-stream sidecar
critic_command = "python -m kaggle_agent.adapters.stage_wrapper --provider critic"
submission_command = ""

[runtime]
conda_env = "kaggle-agent"
shell_init = "source /home/staff/jiayining/miniconda3/etc/profile.d/conda.sh"
train_workdir = "/abs/path/to/kaggle_agent"
train_entrypoint = "train_sed.py"
generated_config_dir = "BirdCLEF-2026-Codebase/configs/generated"

[kaggle]
username = "your-kaggle-username"
model_dataset_id = "your-kaggle-username/birdclef2026-model"
kernel_slug = "birdclef-2026-research-os"
enable_gpu = false
enable_internet = false
is_private = true
cpu_submission_only = true
scored_max_runtime_minutes = 90
max_daily_submissions = 5
max_final_submissions = 2
dataset_sources = ["your-kaggle-username/birdclef2026-model"]
