problem_frame:
  stage: plan
  run_id: run-0001-perch-baseline
  family: perch_cached_probe
  title: 'Perch cached-probe round 2: bundle parity + calibration + diagnostic'
  root_cause: 'The perch cached-probe baseline (val_soundscape_macro_roc_auc=0.665)
    is live but submission bundle parity is not yet validated. The immediate gap is
    not model performance but submission pipeline readiness: the notebook-derived
    Bayesian prior + embedding probe pipeline needs a CPU-only, internet-off bundle
    that reproduces the local score before any daily submission quota is consumed.
    The val_prior_fusion_macro_roc_auc (0.662) is close to the primary metric (0.665),
    confirming the probe head is working but calibration refinement remains conditional.'
  hypothesis: 'Three factors block immediate submission: (1) the CPU-only, internet-off
    bundle has not been dry-run locally, (2) the submission bar requires at least
    calibration and ensemble iteration beyond the raw baseline, and (3) open questions
    about fitted_class_count vs active_class_count remain unresolved. The veto checker
    blocks class_coverage axes, and the branch diversifier recommends backbone/probe_head/prior_calibration
    as the viable mix. Collapsing to a single low-information calibration sweep would
    waste branch budget when the bundle pipeline itself is unvalidated.'
  objective_metric: val_soundscape_macro_roc_auc
  current_metric_value: 0.6649754967376823
  focus: ''
  next_action: Launch a 3-branch portfolio targeting submission bundle parity (primary),
    prior calibration refinement (hedge), and probe-head class-count diagnostic (explore).
    Do not submit.
  adopt_now:
  - "[adopt] Validate submission bundle parity for run-0001-perch-baseline before\
    \ consuming any daily submission quota \u2014 this is the single blocking task.\
    \ [card: imports-kaggle-agent-01-validated-findings-md-submission-findings]"
  - '[adopt] Treat val_soundscape_macro_roc_auc=0.665 as the authoritative local signal
    for this run. Do not over-index on soundscape_macro_roc_auc=0.992 (train-side)
    or prior_fusion_macro_roc_auc=0.487 (unseen). [card: imports-kaggle-agent-01-validated-findings-md-validation-and-metric-semantics,
    imports-kaggle-agent-00-experiment-rules-md-current-runtime-interpretation]'
  - '[adopt] Build the CPU-only, internet-off submission bundle now by packaging the
    Perch embedding cache + linear probe + Bayesian prior into the scored notebook
    format. Dry-run locally to confirm the bundle reproduces predictions. [card: imports-kaggle-agent-01-validated-findings-md-submission-findings]'
  consider:
  - "[consider] After bundle parity is confirmed, the next iteration should target\
    \ prior calibration refinement \u2014 the val_prior_fusion score (0.662) suggests\
    \ the Bayesian prior is functional but not optimal. Anchor-based calibration against\
    \ historical LB scores could improve candidate ranking. [card: imports-kaggle-agent-01-validated-findings-md-submission-findings,\
    \ policy: policy-prior-calibration]"
  - '[consider] If fitted_class_count < active_class_count in the probe head, expand
    class coverage before micro-tuning thresholds or temperature. This remains conditional
    until we inspect the probe output dimensions. [card: imports-kaggle-agent-03-next-experiment-priors-md-perch-probe-lane,
    policy: policy-class-coverage]'
  - '[consider] Embedding-head ensembles (adding a second complementary probe) could
    add signal, but only after the single-probe baseline submission is validated.
    Do not block on this. [card: imports-kaggle-agent-01-validated-findings-md-perch-and-embedding-findings,
    policy: policy-probe-head]'
  - "[consider] Do not submit the perch baseline as a standalone first submission.\
    \ Per the submission bar, iterate through calibration \u2192 ensemble \u2192 soundscape\
    \ prior \u2192 post-processing before submitting. Current baseline is round 1.\
    \ [card: imports-kaggle-agent-04-submission-bar-md-example]"
  reject:
  - '[reject] Do not consume daily submission quota until the CPU-only bundle has
    been dry-run locally and reproduces predictions within tolerance. [card: imports-kaggle-agent-01-validated-findings-md-submission-findings]'
  - '[reject] Do not pursue ornamental architecture changes or micro hyperparameter
    tuning on the probe head before submission bundle parity and class coverage are
    resolved. [card: imports-kaggle-agent-01-validated-findings-md-sed-findings, imports-kaggle-agent-research-run-0003-0002-perch-probe-round-3-close-8-class-coverage-gap-to-75-75-and-apply-calibration-md-actionable-guidance]'
  - "[reject] Do not trust the train-side soundscape_macro_roc_auc=0.992 as a submission-readiness\
    \ signal \u2014 it is not holdout-aware and will overstate quality. [card: imports-kaggle-agent-01-validated-findings-md-validation-and-metric-semantics]"
  query_terms:
