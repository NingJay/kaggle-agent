problem_frame:
  stage: plan
  family: perch_cached_probe
  title: MLP probe head adoption + calibration + domain-shift mitigation
  root_cause: "The class-coverage-expansion-probe pipeline achieved val ROC-AUC 0.6652,\
    \ essentially flat versus the prior run (0.6651). The coverage expansion from\
    \ 52\u219275 active classes with 708 cache rows did not materially move the primary\
    \ metric. The train-val gap (0.992 train vs 0.665 val) confirms overfitting or\
    \ domain shift. Padded_cmap remains very low (0.062). Prior fusion (0.662) tracks\
    \ the raw validation score closely, indicating the Bayesian prior adds negligible\
    \ lift. The lane leader MLP probe from run-0002-0003 holds 0.6801, still the best\
    \ in branch. The blocking issue is now submission bundle parity and calibration\
    \ rather than class coverage expansion."
  hypothesis: 'The research verdict says submission-required, but submitting at 0.6652
    when the lane leader holds 0.6801 leaves 0.015 AUC on the table. The MLP probe
    head from run-0002-0003 is a positive prior at 0.68 confidence and has already
    demonstrated the best score. The negative prior vetoes further micro-tuning on
    the current head architecture, but does not veto adopting the proven MLP configuration
    as a baseline. A submission at 0.6801 is materially stronger than one at 0.6652.
    We should plan a multi-branch follow-up: (1) adopt the MLP probe head as the primary
    submission candidate, (2) add calibration (temperature scaling) as a parallel
    branch, and (3) explore domain-shift augmentation as a speculative branch. This
    preserves branch-search space per the decision rules rather than collapsing to
    a single calibration tweak.'
  objective_metric: val_soundscape_macro_roc_auc
  current_metric_value: 0.6652158470291849
  focus: ''
  next_action: plan
  adopt_now:
  - "[require @ 0.88] Use embedding-head style models as complementary signal \u2014\
    \ card:01-validated-findings-md-perch-and-embedding-findings"
  - "[prefer @ 0.68] Adopt MLP probe head from run-0002-0003 as baseline configuration;\
    \ lane leader at 0.6801 \u2014 card:research-run-0002-0003-coverage-mlp-combined-full-75-class-mlp-probe-md-adopt-now"
  - Package current best configuration (run-0003-0001, val ROC-AUC 0.6652) as submission
    bundle; verdict is submission-required
  - "Calibrate Bayesian prior fusion weights \u2014 current prior fusion val metric\
    \ (0.662) barely exceeds raw val (0.665), indicating miscalibrated temperature\
    \ or weighting"
  consider:
  - "[conditional @ 0.66] If fitted classes still lag active classes after submission,\
    \ re-expand coverage before micro-tuning \u2014 card:03-next-experiment-priors-md-perch-probe-lane"
  - "[conditional @ 0.50] Remaining 8-class gap (67/75 fitted) is still a structural\
    \ blocker for future iterations \u2014 card:research-run-0002-0001-perch-probe-full-class-coverage-expansion-md-root-cause-coverage-gap-narrowed-but-not-closed"
  - "[conditional @ 0.50] Post-submission, revisit class coverage verification \u2014\
    \ card:research-run-0002-0001-perch-probe-iteration-class-coverage-verification-and-calibration-md-run-0002-0001-perch-probe-iteration-class-coverage-verification-and-calibration"
  - "Investigate padded_cmap improvement (currently 0.062) as a secondary axis \u2014\
    \ weak segment-level localization may cap ROC-AUC gains"
  - "Explore domain-shift mitigation: augment training soundscapes or apply frequency-domain\
    \ augmentation to narrow the 0.992\u21920.665 train-val gap"
  - Temperature scaling or isotonic calibration on the probe head logits before submission
    to improve ROC-AUC ranking quality
  reject:
  - "[avoid @ 0.68] Five rounds of micro-tuning (embedding-level mixup, augmentation\
    \ variants) have regressed from the run-0002 baseline. Three distinct axes are\
    \ exhausted \u2014 card:research-run-0009-0008-perch-probe-round-9-embedding-level-mixup-augmentation-on-run-0008-mlp-head-code-state-md-axis-exhaustion-summary"
  - "Do not re-run class coverage expansion in isolation \u2014 this run proved it\
    \ yields flat metric movement (0.6651\u21920.6652)"
  - Do not pursue further MLP head architecture variants without first establishing
    submission parity and calibration
  query_terms:
  - perch_cached_probe
  - mlp
  - probe
  - head
  - adoption
  - calibration
  - domain
  - shift
  - mitigation
